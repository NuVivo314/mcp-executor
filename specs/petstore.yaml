openapi: "3.0.3"
info:
  title: Petstore
  version: "1.0.0"
  description: Sample Petstore API for testing mcp-executor
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            description: Maximum number of pets to return
      responses:
        "200":
          description: A list of pets
    post:
      operationId: createPet
      summary: Create a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Name of the pet
                tag:
                  type: string
                  description: Optional tag
      responses:
        "201":
          description: Pet created
  /pets/{petId}:
    get:
      operationId: getPetById
      summary: Get pet by ID
      description: Returns a single pet by its numeric ID
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A single pet
        "404":
          description: Pet not found
    delete:
      operationId: deletePet
      summary: Delete a pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Pet deleted
        "404":
          description: Pet not found
